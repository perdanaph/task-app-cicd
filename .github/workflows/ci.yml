name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test User Service
  # ─────────────────────────────────────────
  test-user-service:
    name: 🧪 Test User Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json

      - name: Install dependencies
        working-directory: services/user-service
        run: npm ci

      - name: Run tests
        working-directory: services/user-service
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: user-service-coverage
          path: services/user-service/coverage

  # ─────────────────────────────────────────
  # JOB 2: Test Task Service
  # ─────────────────────────────────────────
  test-task-service:
    name: 🧪 Test Task Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/task-service/package-lock.json

      - name: Install dependencies
        working-directory: services/task-service
        run: npm ci

      - name: Run tests
        working-directory: services/task-service
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: task-service-coverage
          path: services/task-service/coverage

  # ─────────────────────────────────────────
  # JOB 3: Test API Gateway
  # ─────────────────────────────────────────
  test-api-gateway:
    name: 🧪 Test API Gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        working-directory: services/api-gateway
        run: npm ci

      - name: Run tests
        working-directory: services/api-gateway
        run: npm test

  # ─────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-user-service, test-task-service, test-api-gateway]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        service:
          - name: user-service
            context: ./services/user-service
            image: ${{ github.actor }}/user-service
          - name: task-service
            context: ./services/task-service
            image: ${{ github.actor }}/task-service
          - name: api-gateway
            context: ./services/api-gateway
            image: ${{ github.actor }}/api-gateway
          - name: migrations
            context: ./migrations
            image: ${{ github.actor }}/migrations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.service.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 5: Deploy Summary
  # ─────────────────────────────────────────
  summary:
    name: 📋 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()

    steps:
      - name: Pipeline Result
        run: |
          echo "## 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | ✅ Tested & Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Task Service | ✅ Tested & Built |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway  | ✅ Tested & Built |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY