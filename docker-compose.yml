version: '3.8'

services:
  migrate:
    build: ./migrations
    container_name: migrate
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # Jalan sekali lalu stop
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    container_name: user-service
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_PORT: 5432
    ports:
      - "3001:3001"
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s 

  task-service:
    build: ./services/task-service
    container_name: task-service
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_PORT: 5432
    ports:
      - "3002:3002"
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      TASK_SERVICE_URL: http://task-service:3002
    ports:
      - "3000:3000"
    networks:
      - appnet
    depends_on:
      - user-service
      - task-service

networks:
  appnet:
    driver: bridge

volumes:
  postgres-data: